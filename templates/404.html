{% extends 'base.html' %}
{% block title %}Page Not Found — HopeBridge{% endblock %}
{% block content %}
<div style="padding-top: 140px; padding-bottom: 6rem; max-width: 550px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem;">
    <div class="hb-card page-enter" style="text-align: center; border-top: 5px solid var(--primary);">
        <span style="font-size: 4.5rem; display: block; margin-bottom: 1rem; color: var(--primary);">404</span>
        <h2 style="margin-bottom: 0.5rem; color: var(--gray-800);">Page Not Found</h2>
        <p style="color: var(--gray-600); line-height: 1.7; margin-bottom: 2rem;">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="{% url 'home' %}" class="btn-primary-hb">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
