{% extends 'base.html' %}

{% block title %}Change Password — HopeBridge{% endblock %}

{% block content %}
<div style="padding-top: 100px; max-width: 500px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem; padding-bottom: 4rem;">
    <div class="hb-card page-enter">
        <h2 style="margin-bottom: 0.5rem;">🔐 Change Password</h2>
        <p style="color: var(--gray-500); margin-bottom: 2rem;">Enter your current password and choose a new one</p>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
            <div class="hb-form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            </div>
            {% endfor %}

            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <a href="{% url 'profile' %}" class="btn-outline-hb">← Cancel</a>
                <button type="submit" class="btn-primary-hb">Update Password</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
