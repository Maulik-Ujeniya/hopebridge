{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — HopeBridge</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">
</head>
<body>
    <div class="auth-page">
        <!-- Background floating shapes -->
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>

        <div class="auth-card">
            <!-- Logo -->
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <a href="{% url 'home' %}" style="font-family: var(--font-display); font-size: 1.8rem; font-weight: 800;">
                    <span class="text-gradient">HopeBridge</span>
                </a>
            </div>

            <h1>Reset Password</h1>
            <p class="auth-subtitle">Enter your email address and we'll send you a reset link.</p>

            {% if form.errors %}
                <div class="hb-alert hb-alert-danger" style="margin-bottom: 1rem;">
                    {{ form.email.errors }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="hb-form-group">
                    <label for="id_email">Email Address</label>
                    <input type="email" name="email" autocomplete="email" required class="form-control" id="id_email" placeholder="Enter your email">
                </div>
                <button type="submit" class="btn-primary-hb" style="width: 100%; justify-content: center; margin-top: 1rem;">Send Reset Link</button>
            </form>

            <p style="text-align: center; margin-top: 2rem; color: rgba(255,255,255,0.5); font-size: 0.9rem;">
                Remembered your password?
                <a href="{% url 'login' %}" class="auth-link">Login Here</a>
            </p>
        </div>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
