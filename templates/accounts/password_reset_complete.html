{% extends 'base.html' %}

{% block title %}Password Updated — HopeBridge{% endblock %}

{% block content %}
<div class="pt-page pb-page page-enter" style="max-width: 540px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem;">
    <div class="hb-card page-enter" style="text-align: center;">
        <h2 style="margin-bottom: 0.75rem;">Password Updated</h2>
        <p style="color: var(--gray-500); line-height: 1.7;">Your password has been changed successfully. You can sign in with the new password now.</p>
        <a href="{% url 'login' %}" class="btn-primary-hb" style="margin-top: 1.5rem;">Go to Login</a>
    </div>
</div>
{% endblock %}
