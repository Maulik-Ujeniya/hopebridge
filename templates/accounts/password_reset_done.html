{% extends 'base.html' %}

{% block title %}Reset Email Sent — HopeBridge{% endblock %}

{% block content %}
<div class="pt-page pb-page page-enter" style="max-width: 540px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem;">
    <div class="hb-card page-enter" style="text-align: center;">
        <h2 style="margin-bottom: 0.75rem;">Check Your Inbox</h2>
        <p style="color: var(--gray-500); line-height: 1.7;">If an account exists for that email address, we sent password reset instructions.</p>
        <a href="{% url 'login' %}" class="btn-primary-hb" style="margin-top: 1.5rem;">Back to Login</a>
    </div>
</div>
{% endblock %}
