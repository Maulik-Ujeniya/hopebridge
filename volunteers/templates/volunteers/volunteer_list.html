<!DOCTYPE html>
<html>
<head><title>Volunteers List</title></head>
<body>
    {% extends 'base.html' %}

{% block content %}
<h1>All Volunteers</h1>
<table class="table table-striped">
    <thead>
        <tr><th>Name</th><th>Email</th><th>Hours Contributed</th></tr>
    </thead>
    <tbody>
        {% for volunteer in volunteers %}
        <tr>
            <td>{{ volunteer.name }}</td>
            <td>{{ volunteer.email }}</td>
            <td>{{ volunteer.hours_contributed }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
</body>
</html>
