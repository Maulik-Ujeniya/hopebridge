<!DOCTYPE html>
<html>
<head><title>Programs List</title></head>
<body>
    {% extends 'base.html' %}

{% block content %}
<h1>All Programs</h1>
<table class="table table-striped">
    <thead>
        <tr><th>Name</th><th>Type</th><th>Start Date</th></tr>
    </thead>
    <tbody>
        {% for program in programs %}
        <tr>
            <td><a href="/programs/{{ program.id }}/">{{ program.name }}</a></td>
            <td>{{ program.program_type }}</td>
            <td>{{ program.start_date }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
    </ul>
</body>
</html>
