<!DOCTYPE html>

<html lang="en">
<head>
    <title>Donors List</title>
</head>
<body>
   {% extends 'base.html' %}

{% block content %}
<h1>All Donors</h1>
<table class="table table-striped">
    <thead>
        <tr><th>Name</th><th>Email</th><th>Total Donated</th></tr>
    </thead>
    <tbody>
        {% for donor in donors %}
        <tr>
            <td>{{ donor.name }}</td>
            <td>{{ donor.email }}</td>
            <td>₹{{ donor.total_donated }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
</body>
</html>
