{% extends 'base.html' %}

{% block content %}
<h1>Delete Donation</h1>
<p>Are you sure you want to delete this donation from <strong>{{ donation.donor.name }}</strong>? This cannot be undone.</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="/donations/{{ donation.id }}/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
