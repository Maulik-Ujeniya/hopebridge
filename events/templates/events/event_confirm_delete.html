{% extends 'base.html' %}

{% block content %}
<h1>Delete Event</h1>
<p>Are you sure you want to delete <strong>{{ event.name }}</strong>? This cannot be undone.</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="/events/{{ event.id }}/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
