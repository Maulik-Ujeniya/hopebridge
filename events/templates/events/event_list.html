{% extends 'base.html' %}

{% block content %}
<a href="/events/add/" class="btn btn-success mb-3">+ Add Event</a>
<table class="table table-striped">
    <thead>
        <tr><th>Name</th><th>Date</th><th>Budget Allocated</th></tr>
    </thead>
    <tbody>
        {% for event in events %}
        <tr>
            <td><a href="/events/{{ event.id }}/">{{ event.name }}</a></td>
            <td>{{ event.date }}</td>
            <td>₹{{ event.budget_allocated }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
