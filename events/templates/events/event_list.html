<!DOCTYPE html>
<html>
<head><title>Events List</title></head>
<body>
    {% extends 'base.html' %}

{% block content %}
<h1>All Events</h1>
<table class="table table-striped">
    <thead>
        <tr><th>Name</th><th>Date</th><th>Budget Allocated</th></tr>
    </thead>
    <tbody>
        {% for event in events %}
        <tr>
            <td>{{ event.name }}</td>
            <td>{{ event.date }}</td>
            <td>₹{{ event.budget_allocated }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
</body>
</html>
